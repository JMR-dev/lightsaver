type Login {
    email: String!
    password: String!
  }
type LoginResponse {
    loginStatus: Boolean!
  }

type Subscription {
  login: Login!
  },
  required: ["email", "password"]

subscription login($email: String!, $password: String!) {
  login(email: $email, password: $password) {
      id
      email
    loginStatus
  }
}