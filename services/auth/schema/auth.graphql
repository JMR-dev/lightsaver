type userLogin {
    email: String!
    password: String!
  }
type userLoginResponse {
    userLoginSuccessStatus: Boolean!
  }

type userLogout {
    email: String!
  }
type userLogoutResponse {
    userLoggedOutSuccessStatus: Boolean!
  }
type CreateUser {
    firstName: String!
    lastName: String!
    email: String!
    password: String!
    dateOfBirth: String!
  }
type CreateUserResponse {
    userCreatedStatus: Boolean!
  }

type Mutation {
    login(input: userLogin!): userLoginResponse!
    logout(input: userLogout!): user LogoutResponse!
    createUser(input: CreateUser!): CreateUserResponse!
  }